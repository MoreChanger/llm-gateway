<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proxy · Token 统计</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper:    #f9f7f0;
      --card:     #fffdf5;
      --ink:      #1c1c2e;
      --ink-lt:   rgba(28,28,46,.12);
      --muted:    #8888a8;
      --muted2:   #b8b8cc;
      --red:      #d94f4f;
      --red-lt:   #fdeaea;
      --blue:     #2d72d9;
      --blue-lt:  #e8f1fd;
      --green:    #1a9e5a;
      --green-lt: #e5f5ec;
      --purple:   #7251d4;
      --purple-lt:#ece8fb;
      --orange:   #d9762d;
      --orange-lt:#fdf0e5;
      --teal:     #0d9488;
      --teal-lt:  #e5f7f5;
      --font:     'Caveat', cursive;
      --border:   2px solid var(--ink);
      /* sketchy uneven radii */
      --r-card:   4px 12px 5px 10px / 10px 5px 12px 4px;
      --r-sm:     3px 8px 4px 7px / 7px 4px 8px 3px;
      --r-btn:    4px 10px 3px 9px / 8px 3px 10px 4px;
    }

    /* ── Graph paper background ── */
    html { background: var(--paper); }
    body {
      background-color: var(--paper);
      background-image:
        /* major grid lines */
        linear-gradient(rgba(100,140,220,.13) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100,140,220,.13) 1px, transparent 1px),
        /* minor grid lines */
        linear-gradient(rgba(100,140,220,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100,140,220,.06) 1px, transparent 1px);
      background-size: 40px 40px, 40px 40px, 8px 8px, 8px 8px;
      background-position: -1px -1px, -1px -1px, -1px -1px, -1px -1px;
      color: var(--ink);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.4;
      min-height: 100vh;
      padding: 36px 24px 80px;
    }

    .root { max-width: 1120px; margin: 0 auto; }

    /* ── Sketchy box mixin ── */
    .sketchy {
      background: var(--card);
      border: var(--border);
      border-radius: var(--r-card);
      box-shadow: 4px 4px 0 var(--ink-lt);
      position: relative;
    }
    .sketchy:hover {
      box-shadow: 5px 5px 0 rgba(28,28,46,.18);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
      padding: 16px 22px;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      font-size: 22px;
      line-height: 1;
      animation: wobble 4s ease-in-out infinite;
    }
    @keyframes wobble {
      0%,100% { transform: rotate(-4deg); }
      50%      { transform: rotate(4deg);  }
    }
    header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
    }
    header h1 span {
      font-weight: 400;
      color: var(--muted);
      font-size: 18px;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--green);
      padding: 4px 10px;
      border: 1.5px solid var(--green);
      border-radius: var(--r-sm);
      background: var(--green-lt);
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 1.8s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    #updated {
      font-size: 13px;
      color: var(--muted2);
      margin-left: auto;
    }
    #refresh-btn {
      font-family: var(--font);
      font-size: 15px;
      font-weight: 600;
      padding: 6px 16px;
      border: var(--border);
      border-radius: var(--r-btn);
      background: var(--card);
      color: var(--ink);
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--ink-lt);
      transition: box-shadow .15s, transform .15s;
    }
    #refresh-btn:hover {
      box-shadow: 4px 4px 0 rgba(28,28,46,.2);
      transform: translate(-1px,-1px);
    }
    #refresh-btn:active {
      box-shadow: 1px 1px 0 var(--ink-lt);
      transform: translate(2px,2px);
    }

    /* ── Stat cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(6,1fr);
      gap: 16px;
      margin-bottom: 20px;
    }
    @media (max-width: 1100px) { .cards { grid-template-columns: repeat(3,1fr); } }
    @media (max-width: 680px) { .cards { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 480px) { .cards { grid-template-columns: 1fr; } }

    .card {
      padding: 18px 20px 16px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(16px) scale(.97);
    }
    .card.visible {
      animation: pop-in .4s cubic-bezier(.34,1.46,.64,1) forwards;
    }
    @keyframes pop-in { to { opacity:1; transform:translateY(0) scale(1); } }

    /* folded corner triangle */
    .card::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 0; height: 0;
      border-style: solid;
    }
    .c-req::after    { border-width: 0 28px 28px 0; border-color: transparent var(--red)    transparent transparent; }
    .c-in::after     { border-width: 0 28px 28px 0; border-color: transparent var(--blue)   transparent transparent; }
    .c-out::after    { border-width: 0 28px 28px 0; border-color: transparent var(--green)  transparent transparent; }
    .c-tot::after    { border-width: 0 28px 28px 0; border-color: transparent var(--purple) transparent transparent; }
    .c-cache-r::after{ border-width: 0 28px 28px 0; border-color: transparent var(--orange) transparent transparent; }
    .c-cache-c::after{ border-width: 0 28px 28px 0; border-color: transparent var(--teal)   transparent transparent; }

    /* colored left rule */
    .card::before {
      content: '';
      position: absolute;
      top: 12px; bottom: 12px; left: 0;
      width: 3px;
      border-radius: 0 3px 3px 0;
    }
    .c-req::before    { background: var(--red);    }
    .c-in::before     { background: var(--blue);   }
    .c-out::before    { background: var(--green);  }
    .c-tot::before    { background: var(--purple); }
    .c-cache-r::before{ background: var(--orange); }
    .c-cache-c::before{ background: var(--teal);   }

    .card-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 8px;
    }
    .card-value {
      font-size: 38px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
    }
    .c-req .card-value     { color: var(--red);    }
    .c-in .card-value      { color: var(--blue);   }
    .c-out .card-value     { color: var(--green);  }
    .c-tot .card-value     { color: var(--purple); }
    .c-cache-r .card-value { color: var(--orange); }
    .c-cache-c .card-value { color: var(--teal);   }

    .card-sub { font-size: 13px; color: var(--muted2); }

    /* colored bg tint */
    .c-req     { background: color-mix(in srgb, var(--red-lt)     60%, var(--card)); }
    .c-in      { background: color-mix(in srgb, var(--blue-lt)    60%, var(--card)); }
    .c-out     { background: color-mix(in srgb, var(--green-lt)   60%, var(--card)); }
    .c-tot     { background: color-mix(in srgb, var(--purple-lt)  60%, var(--card)); }
    .c-cache-r { background: color-mix(in srgb, var(--orange-lt)  60%, var(--card)); }
    .c-cache-c { background: color-mix(in srgb, var(--teal-lt)    60%, var(--card)); }

    /* ── Panels ── */
    .panel {
      padding: 22px 24px;
      margin-bottom: 18px;
      opacity: 0;
      animation: pop-in .45s .25s cubic-bezier(.34,1.36,.64,1) forwards;
    }
    .panel-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1.5px solid var(--ink-lt);
      /* slight angle on the border — hand-drawn feel */
      position: relative;
    }
    /* wobbly underline */
    .panel-header::after {
      content: '';
      position: absolute;
      bottom: -1.5px; left: 0; right: 0;
      height: 1.5px;
      background: var(--ink-lt);
      transform: rotate(-.15deg);
    }
    .panel-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
    }
    .panel-title-mark {
      font-size: 14px;
      color: var(--muted2);
      font-weight: 400;
    }
    .panel-sub {
      font-size: 13px;
      color: var(--muted2);
      margin-left: auto;
    }
    .chart-wrap { position: relative; height: 280px; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-family: var(--font); }
    thead th {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      padding: 6px 12px 12px;
      text-align: left;
      border-bottom: 2px solid var(--ink-lt);
    }
    thead th.r { text-align: right; }
    tbody td {
      padding: 11px 12px;
      border-bottom: 1px dashed var(--ink-lt);
      font-size: 15px;
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background .12s; }
    tbody tr:hover td { background: rgba(28,28,46,.03); }

    .model-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .num-cell { font-size: 15px; text-align: right; white-space: nowrap; }
    .nc-req     { color: var(--red);    font-weight: 600; }
    .nc-in      { color: var(--blue);   font-weight: 600; }
    .nc-out     { color: var(--green);  font-weight: 600; }
    .nc-cache-r { color: var(--orange); font-weight: 600; }
    .nc-cache-c { color: var(--teal);   font-weight: 600; }

    .bar-cell { display: flex; align-items: center; gap: 10px; min-width: 130px; }
    .bar-val {
      font-size: 15px;
      font-weight: 700;
      color: var(--purple);
      min-width: 52px;
      text-align: right;
    }
    .mini-bar {
      flex: 1;
      height: 8px;
      border: 1.5px solid var(--ink-lt);
      border-radius: 2px 5px 3px 4px;
      overflow: hidden;
      background: var(--purple-lt);
    }
    .mini-fill {
      height: 100%;
      background: var(--purple);
      border-radius: 2px;
      transition: width .65s cubic-bezier(.34,1.3,.64,1);
    }

    .empty-row td {
      text-align: center;
      color: var(--muted2);
      font-size: 15px;
      padding: 36px;
    }

    /* ── Stagger delays ── */
    .card:nth-child(1) { animation-delay: .04s; }
    .card:nth-child(2) { animation-delay: .10s; }
    .card:nth-child(3) { animation-delay: .16s; }
    .card:nth-child(4) { animation-delay: .22s; }
    .card:nth-child(5) { animation-delay: .28s; }
    .card:nth-child(6) { animation-delay: .34s; }
    .panel:nth-of-type(1) { animation-delay: .40s; }
    .panel:nth-of-type(2) { animation-delay: .46s; }

    @media (max-width: 880px) { .col-hide { display: none; } .mini-bar { display:none; } }
  </style>
</head>
<body>
  <div class="root">

    <header class="sketchy">
      <div class="logo">
        <span class="logo-icon">✏️</span>
        <h1>llm-gateway <span>/ token 统计</span></h1>
      </div>
      <div class="live-badge"><div class="live-dot"></div>live</div>
      <span id="updated"></span>
      <button id="refresh-btn" onclick="load()">↻ 刷新</button>
    </header>

    <div class="cards">
      <div class="card sketchy c-req">
        <div class="card-label">请求总数</div>
        <div class="card-value" id="v-req">—</div>
        <div class="card-sub" id="v-req-sub">&nbsp;</div>
      </div>
      <div class="card sketchy c-in">
        <div class="card-label">输入 Tokens</div>
        <div class="card-value" id="v-in">—</div>
        <div class="card-sub" id="v-in-full">&nbsp;</div>
      </div>
      <div class="card sketchy c-out">
        <div class="card-label">输出 Tokens</div>
        <div class="card-value" id="v-out">—</div>
        <div class="card-sub" id="v-out-full">&nbsp;</div>
      </div>
      <div class="card sketchy c-tot">
        <div class="card-label">合计 Tokens</div>
        <div class="card-value" id="v-tot">—</div>
        <div class="card-sub" id="v-tot-full">&nbsp;</div>
      </div>
      <div class="card sketchy c-cache-r">
        <div class="card-label">缓存命中</div>
        <div class="card-value" id="v-cache-r">—</div>
        <div class="card-sub" id="v-cache-r-full">&nbsp;</div>
      </div>
      <div class="card sketchy c-cache-c">
        <div class="card-label">缓存写入</div>
        <div class="card-value" id="v-cache-c">—</div>
        <div class="card-sub" id="v-cache-c-full">&nbsp;</div>
      </div>
    </div>

    <div class="panel sketchy">
      <div class="panel-header">
        <span class="panel-title">每日用量</span>
        <span class="panel-title-mark">近 30 天</span>
        <span class="panel-sub" id="chart-range"></span>
      </div>
      <div class="chart-wrap">
        <canvas id="chart-daily"></canvas>
      </div>
    </div>

    <div class="panel sketchy">
      <div class="panel-header">
        <span class="panel-title">按模型分布</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>模型</th>
            <th class="r col-hide" style="color:var(--red)">请求</th>
            <th class="r col-hide" style="color:var(--blue)">输入</th>
            <th class="r col-hide" style="color:var(--green)">输出</th>
            <th class="r col-hide" style="color:var(--orange)">缓存命中</th>
            <th class="r col-hide" style="color:var(--teal)">缓存写入</th>
            <th style="padding-left:4px">总量</th>
          </tr>
        </thead>
        <tbody id="model-tbody">
          <tr class="empty-row"><td colspan="7">加载中…</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script>
    const fmt  = n => n >= 1e6 ? (n/1e6).toFixed(2)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'K' : String(n);
    const full = n => n.toLocaleString('zh-CN');

    function countUp(el, target, dur = 700) {
      const t0   = performance.now();
      const from = parseInt(el.dataset.val || '0', 10);
      el.dataset.val = target;
      const tick = now => {
        const p = Math.min((now - t0) / dur, 1);
        const e = 1 - Math.pow(1 - p, 3);
        el.textContent = fmt(Math.round(from + (target - from) * e));
        if (p < 1) requestAnimationFrame(tick);
        else el.textContent = fmt(target);
      };
      requestAnimationFrame(tick);
    }

    /* chart defaults — match paper aesthetic */
    Chart.defaults.font.family = "'Caveat', cursive";
    Chart.defaults.color = '#8888a8';
    Chart.defaults.borderColor = 'rgba(28,28,46,.08)';

    let chart = null;

    function buildChart(labels, inputs, outputs, cacheRead) {
      const ctx = document.getElementById('chart-daily').getContext('2d');

      if (chart) {
        chart.data.labels           = labels;
        chart.data.datasets[0].data = inputs;
        chart.data.datasets[1].data = outputs;
        chart.data.datasets[2].data = cacheRead;
        chart.update('active');
        return;
      }

      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [
            {
              label: '输入',
              data: inputs,
              backgroundColor: 'rgba(45,114,217,.55)',
              hoverBackgroundColor: 'rgba(45,114,217,.8)',
              stack: 'tok',
              borderRadius: { topLeft: 0, topRight: 0, bottomLeft: 3, bottomRight: 3 },
              borderSkipped: 'bottom',
            },
            {
              label: '输出',
              data: outputs,
              backgroundColor: 'rgba(26,158,90,.55)',
              hoverBackgroundColor: 'rgba(26,158,90,.8)',
              stack: 'tok',
              borderRadius: { topLeft: 4, topRight: 4, bottomLeft: 0, bottomRight: 0 },
              borderSkipped: 'bottom',
            },
            {
              label: '缓存命中',
              data: cacheRead,
              backgroundColor: 'rgba(217,118,45,.55)',
              hoverBackgroundColor: 'rgba(217,118,45,.8)',
              stack: 'cache',
              borderRadius: 4,
              borderSkipped: false,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 700, easing: 'easeOutQuart' },
          plugins: {
            legend: {
              position: 'top',
              align: 'end',
              labels: {
                font: { family: "'Caveat', cursive", size: 14, weight: '600' },
                boxWidth: 12, boxHeight: 12,
                borderRadius: 3, useBorderRadius: true,
                padding: 16, color: '#8888a8',
              },
            },
            tooltip: {
              backgroundColor: '#fffdf5',
              borderColor: 'rgba(28,28,46,.2)',
              borderWidth: 1.5,
              titleColor: '#1c1c2e',
              bodyColor: '#8888a8',
              footerColor: '#1c1c2e',
              titleFont: { family: "'Caveat', cursive", size: 15, weight: '700' },
              bodyFont:  { family: "'Caveat', cursive", size: 14 },
              footerFont:{ family: "'Caveat', cursive", size: 14, weight: '700' },
              padding: 12,
              callbacks: {
                label:  c => `  ${c.dataset.label}  ${full(c.raw)}`,
                footer: items => `  合计  ${full(items.reduce((s,i)=>s+i.raw,0))}`,
              },
            },
          },
          scales: {
            x: {
              stacked: true,
              grid: { display: false },
              ticks: { font: { family: "'Caveat', cursive", size: 13 }, color: '#b8b8cc', maxRotation: 40 },
            },
            y: {
              stacked: true,
              grid: { color: 'rgba(100,140,220,.1)' },
              ticks: {
                font: { family: "'Caveat', cursive", size: 13 },
                color: '#b8b8cc',
                callback: v => fmt(v),
              },
            },
          },
        },
      });
    }

    async function load() {
      let data;
      try {
        const res = await fetch('/stats/data');
        if (!res.ok) throw new Error(res.status);
        data = await res.json();
      } catch(e) {
        console.error('fetch error', e);
        return;
      }

      const s = data.summary || {};
      countUp(document.getElementById('v-req'),     s.requests              || 0);
      countUp(document.getElementById('v-in'),      s.input_tokens          || 0);
      countUp(document.getElementById('v-out'),     s.output_tokens         || 0);
      countUp(document.getElementById('v-tot'),     s.total_tokens          || 0);
      countUp(document.getElementById('v-cache-r'), s.cache_read_tokens     || 0);
      countUp(document.getElementById('v-cache-c'), s.cache_creation_tokens || 0);

      document.getElementById('v-req-sub').textContent     = 'total api calls';
      document.getElementById('v-in-full').textContent     = full(s.input_tokens          || 0);
      document.getElementById('v-out-full').textContent    = full(s.output_tokens         || 0);
      document.getElementById('v-tot-full').textContent    = full(s.total_tokens          || 0);
      document.getElementById('v-cache-r-full').textContent= full(s.cache_read_tokens     || 0);
      document.getElementById('v-cache-c-full').textContent= full(s.cache_creation_tokens || 0);
      document.getElementById('updated').textContent       = new Date().toLocaleTimeString();

      document.querySelectorAll('.card').forEach(c => c.classList.add('visible'));

      const days      = [...(data.by_day || [])].reverse();
      const labels    = days.map(d => d.key);
      const inputs    = days.map(d => d.input_tokens);
      const outputs   = days.map(d => d.output_tokens);
      const cacheRead = days.map(d => d.cache_read_tokens || 0);

      if (days.length) {
        const f = days[0].key, l = days[days.length-1].key;
        document.getElementById('chart-range').textContent = f === l ? f : `${f} → ${l}`;
      }
      buildChart(labels, inputs, outputs, cacheRead);

      const models = data.by_model || [];
      const maxTok = models.length ? models[0].total_tokens : 1;
      const tbody  = document.getElementById('model-tbody');

      if (!models.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="7">暂无数据</td></tr>';
        return;
      }

      tbody.innerHTML = models.map(m => `
        <tr>
          <td><div class="model-name" title="${m.key}">${m.key}</div></td>
          <td class="num-cell nc-req col-hide">${full(m.requests)}</td>
          <td class="num-cell nc-in  col-hide">${fmt(m.input_tokens)}</td>
          <td class="num-cell nc-out col-hide">${fmt(m.output_tokens)}</td>
          <td class="num-cell nc-cache-r col-hide">${fmt(m.cache_read_tokens || 0)}</td>
          <td class="num-cell nc-cache-c col-hide">${fmt(m.cache_creation_tokens || 0)}</td>
          <td>
            <div class="bar-cell">
              <span class="bar-val">${fmt(m.total_tokens)}</span>
              <div class="mini-bar">
                <div class="mini-fill" style="width:${Math.round(m.total_tokens/maxTok*100)}%"></div>
              </div>
            </div>
          </td>
        </tr>`).join('');
    }

    load();
    setInterval(load, 30_000);
  </script>
</body>
</html>
