listen: :8080
stats_db: ./data/stats.db

# ============================================================
# 新格式：多协议自动路由（推荐）
# ============================================================
upstreams:
  anthropic:
    url: https://modelservice.jdcloud.com/coding/anthropic
    protocol: anthropic
  openai:
    url: https://modelservice.jdcloud.com/coding/openai
    protocol: openai

routes:
  - path: /v1/messages
    upstream: anthropic
  - path: /v1/models
    upstream: anthropic
  - path: /v1/chat/completions
    upstream: openai
  - path: /models
    upstream: anthropic

overload_rules:
  - status: 400
    body_contains: "overloaded"
    max_retries: 10
    delay: 2s
    jitter: 1s
  - status: 400
    body_contains: "Too many requests"
    max_retries: 10
    delay: 2s
    jitter: 1s
  - status: 429
    max_retries: 10
    delay: 2s
    jitter: 1s
  - status: 500
    max_retries: 5
    delay: 3s
    jitter: 1s

